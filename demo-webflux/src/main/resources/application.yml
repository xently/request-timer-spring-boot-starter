spring:
  application:
    name: books-api-demo
  jpa:
    show-sql: true
    generate-ddl: true
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.H2Dialect
  datasource:
    url: jdbc:h2:mem:kcbdb
    driverClassName: org.h2.Driver
    username: sa
    password: password
  sql:
    init:
      schema-locations:
        - classpath:schema.sql
      data-locations:
        - classpath:data.sql
request-timer:
  header-name: X-Elapsed-Time
  default-header-date-pattern: "yyyy-MM-dd'T'HH:mm:ss.SSS"